<html>

<head>
    <title>Doodle AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #scratchPad { cursor: crosshair; display: block; }
        .confidence-bar { transition: width 0.3s ease; }
    </style>
</head>

<body>
    <div class="container py-3">
        <h2>🎨 Doodle AI <small class="text-muted fs-6">Powered by WebGPU</small></h2>

        <!-- WebGPU status banner -->
        <div id="gpuStatus" class="alert alert-secondary py-1 mb-3">Initialising WebGPU…</div>

        <div class="row g-3">

            <!-- ── Step 1: Draw & Label ───────────────────────────────── -->
            <div class="col-lg-4">
                <div class="card h-100">
                    <div class="card-header"><strong>Step 1 — Draw &amp; Label</strong></div>
                    <div class="card-body">
                        <!--
                            The toolbar div (id="toolbar") and the stroke / lineWidth / clear
                            elements must stay here so drawer.js continues to work unchanged.
                        -->
                        <div id="toolbar">
                            <div class="mb-2 d-flex align-items-center gap-2 flex-wrap">
                                <label for="stroke" class="mb-0">Color</label>
                                <input id="stroke" name="stroke" type="color" value="#000000"
                                    class="form-control form-control-color" style="width:38px;height:32px">
                                <label for="lineWidth" class="mb-0">Width</label>
                                <input id="lineWidth" name="lineWidth" type="number" value="5" min="1" max="20"
                                    class="form-control form-control-sm" style="width:60px">
                                <button type="button" id="clear"
                                    class="btn btn-sm btn-outline-secondary">Clear</button>
                            </div>

                            <canvas id="scratchPad"
                                style="width:224px;height:224px;outline:gray 5px solid;margin-bottom:8px">
                            </canvas>

                            <div class="input-group mt-2">
                                <input id="imageLabel" type="text" class="form-control"
                                    placeholder="Label (e.g. cat, dog, house)">
                                <button type="button" class="btn btn-success"
                                    onclick="addSample()">Add to Training Set</button>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-secondary mt-2"
                                onclick="downloadImage()">Download PNG</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Step 2: Train ─────────────────────────────────────── -->
            <div class="col-lg-4">
                <div class="card h-100">
                    <div class="card-header"><strong>Step 2 — Train Model</strong></div>
                    <div class="card-body d-flex flex-column">
                        <p id="sampleStats" class="text-muted mb-1">No training samples yet.</p>
                        <div id="labelList" class="mb-3"></div>

                        <div class="mb-2">
                            <label class="form-label mb-0">Model architecture</label>
                            <select id="modelSelect" class="form-select form-select-sm mb-2">
                                <option value="tiny">Tiny (64→32) — fastest</option>
                                <option value="small" selected>Small (128→64) — default</option>
                                <option value="medium">Medium (256→128)</option>
                                <option value="large">Large (512→256) — slowest</option>
                            </select>

                            <label class="form-label mb-0">Image size</label>
                            <select id="imgSizeSelect" class="form-select form-select-sm mb-2">
                                <option value="14">14×14 — smallest</option>
                                <option value="28" selected>28×28 — default</option>
                                <option value="56">56×56</option>
                                <option value="112">112×112 — largest</option>
                            </select>

                            <label class="form-label mb-0">
                                Epochs: <span id="epochDisplay">100</span>
                            </label>
                            <input id="epochsInput" type="range" min="10" max="500" value="100"
                                class="form-range"
                                oninput="document.getElementById('epochDisplay').textContent = this.value">

                            <label class="form-label mb-0 mt-1">
                                Learning rate: <span id="lrDisplay">0.010</span>
                            </label>
                            <input id="lrInput" type="range" min="1" max="100" value="10"
                                class="form-range"
                                oninput="document.getElementById('lrDisplay').textContent =
                                    (this.value / 1000).toFixed(3)">
                        </div>

                        <button type="button" id="trainBtn" class="btn btn-primary"
                            onclick="trainModel()" disabled>Train Model</button>

                        <div id="trainingProgress" class="mt-2" style="display:none">
                            <div class="progress">
                                <div id="progressBar"
                                    class="progress-bar progress-bar-striped progress-bar-animated"
                                    role="progressbar" style="width:0%">0%</div>
                            </div>
                            <small id="trainingStatus" class="text-muted"></small>
                        </div>

                        <div class="d-flex flex-wrap gap-2 mt-auto mt-3">
                            <button type="button" class="btn btn-sm btn-outline-success"
                                onclick="saveTrainingData()">Save Training Data</button>
                            <label class="btn btn-sm btn-outline-success mb-0">
                                Load Training Data
                                <input type="file" id="loadDataInput" accept=".json"
                                    style="display:none" onchange="loadTrainingData(this)">
                            </label>
                            <button type="button" id="viewSamplesBtn" class="btn btn-sm btn-outline-secondary"
                                onclick="toggleTrainingView()">View Samples</button>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                onclick="clearData()">Clear All Data</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Step 3: Classify ──────────────────────────────────── -->
            <div class="col-lg-4">
                <div class="card h-100">
                    <div class="card-header"><strong>Step 3 — Classify</strong></div>
                    <div class="card-body d-flex flex-column">
                        <p class="text-muted small">
                            Draw something on the canvas, then click Classify to run inference.
                        </p>
                        <button type="button" id="classifyBtn" class="btn btn-warning"
                            onclick="classifyDrawing()" disabled>Classify Drawing</button>
                        <div id="classifyResults" class="mt-3"></div>
                    </div>
                </div>
            </div>

        </div><!-- /row -->

        <!-- ── Training Data Viewer ──────────────────────────────── -->
        <div id="trainingDataViewer" class="mt-3" style="display:none">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <strong>Training Samples</strong>
                    <button type="button" class="btn-close" onclick="toggleTrainingView()"></button>
                </div>
                <div class="card-body">
                    <div id="sampleGallery" class="d-flex flex-wrap gap-3"></div>
                </div>
            </div>
        </div>
    </div><!-- /container -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webgpu-torch@latest/torch.js"></script>
    <script src="drawer.js"></script>
    <script src="model.js"></script>
    <script>
        // ── Initialise drawing canvas ──────────────────────────────────
        initDraw();

        // ── Initialise WebGPU ──────────────────────────────────────────
        (async () => {
            const statusEl = document.getElementById('gpuStatus');
            const available = await classifier.init();
            if (available) {
                statusEl.className = 'alert alert-success py-1 mb-3';
                statusEl.textContent = '✓ WebGPU is available';
            } else {
                statusEl.className = 'alert alert-warning py-1 mb-3';
                statusEl.textContent = '⚠ WebGPU not available — training and inference will use the CPU';
            }
        })();

        // ── Step 1 helpers ─────────────────────────────────────────────

        function addSample() {
            const canvas = document.getElementById('scratchPad');
            const label  = document.getElementById('imageLabel').value.trim();
            if (!label) { alert('Please enter a label for your drawing.'); return; }

            const result = classifier.addSample(canvas, label);
            _updateSampleDisplay(result);

            // Clear the canvas so the user can draw the next sample
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Enable Train button once we have ≥2 different labels
            document.getElementById('trainBtn').disabled = result.labels.length < 2;
        }

        function downloadImage() {
            const canvas = document.getElementById('scratchPad');
            const rawLabel = document.getElementById('imageLabel').value.trim() || 'doodle';
            // Sanitise the label so it is safe to use as a filename
            const safeLabel = rawLabel.replace(/[/\\:*?"<>|]/g, '_');
            const a = document.createElement('a');
            a.href     = canvas.toDataURL('image/png');
            a.download = safeLabel + '.png';
            a.click();
        }

        function _updateSampleDisplay(result) {
            document.getElementById('sampleStats').textContent =
                result.totalSamples + ' sample(s) · ' + result.labels.length + ' label(s)';
            document.getElementById('labelList').innerHTML =
                result.counts.map(c =>
                    '<span class="badge bg-primary me-1 mb-1">' + c.label + ': ' + c.count + '</span>'
                ).join('');
        }

        // ── Step 2 helpers ─────────────────────────────────────────────

        async function trainModel() {
            const trainBtn    = document.getElementById('trainBtn');
            const classifyBtn = document.getElementById('classifyBtn');
            const progressDiv = document.getElementById('trainingProgress');
            const progressBar = document.getElementById('progressBar');
            const statusEl    = document.getElementById('trainingStatus');

            const epochs = parseInt(document.getElementById('epochsInput').value, 10);
            const lr     = parseInt(document.getElementById('lrInput').value, 10) / 1000;
            const model  = document.getElementById('modelSelect').value;
            const imgSize = parseInt(document.getElementById('imgSizeSelect').value, 10);
            classifier.setModelConfig(model);
            classifier.setImgSize(imgSize);

            trainBtn.disabled    = true;
            classifyBtn.disabled = true;
            progressDiv.style.display = 'block';
            progressBar.className = 'progress-bar progress-bar-striped progress-bar-animated';
            statusEl.textContent = 'Starting training…';

            try {
                await classifier.train(epochs, lr, (epoch, total, loss) => {
                    const pct = Math.round((epoch / total) * 100);
                    progressBar.style.width   = pct + '%';
                    progressBar.textContent   = pct + '%';
                    statusEl.textContent =
                        'Epoch ' + epoch + '/' + total + ' · Loss: ' + loss.toFixed(4);
                });

                progressBar.className   = 'progress-bar bg-success';
                progressBar.style.width = '100%';
                progressBar.textContent = '100%';
                statusEl.textContent    = '✓ Training complete!';
                classifyBtn.disabled    = false;
            } catch (e) {
                statusEl.textContent  = '✗ ' + e.message;
                progressBar.className = 'progress-bar bg-danger';
            } finally {
                trainBtn.disabled = false;
            }
        }

        function clearData() {
            if (!confirm('Clear all training data and reset the model?')) return;
            classifier.clearData();
            document.getElementById('sampleStats').textContent    = 'No training samples yet.';
            document.getElementById('labelList').innerHTML         = '';
            document.getElementById('trainBtn').disabled          = true;
            document.getElementById('classifyBtn').disabled       = true;
            document.getElementById('classifyResults').innerHTML  = '';
            document.getElementById('trainingProgress').style.display = 'none';
            document.getElementById('trainingDataViewer').style.display = 'none';
            document.getElementById('sampleGallery').innerHTML    = '';
        }

        // ── Step 3 helpers ─────────────────────────────────────────────

        async function classifyDrawing() {
            const canvas    = document.getElementById('scratchPad');
            const resultsEl = document.getElementById('classifyResults');
            try {
                const predictions = await classifier.predict(canvas);
                resultsEl.innerHTML = predictions.map((p, i) => {
                    const pct    = (p.confidence * 100).toFixed(1);
                    const isBest = i === 0;
                    return '<div class="mb-2">' +
                        '<div class="d-flex justify-content-between">' +
                            '<span class="' + (isBest ? 'fw-bold' : '') + '">' + p.label + '</span>' +
                            '<span>' + pct + '%</span>' +
                        '</div>' +
                        '<div class="progress" style="height:8px">' +
                            '<div class="progress-bar confidence-bar ' +
                                (isBest ? 'bg-success' : 'bg-secondary') + '"' +
                                ' style="width:' + pct + '%"></div>' +
                        '</div>' +
                    '</div>';
                }).join('');
            } catch (e) {
                resultsEl.innerHTML =
                    '<div class="alert alert-danger py-1 small">' + e.message + '</div>';
            }
        }
        // ── Training data: save / load / view ─────────────────────

        function saveTrainingData() {
            const data = classifier.exportTrainingData();
            if (data.trainingData.length === 0) {
                alert('No training data to save.');
                return;
            }
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a    = document.createElement('a');
            a.href     = URL.createObjectURL(blob);
            a.download = 'training-data.json';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function loadTrainingData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data   = JSON.parse(e.target.result);
                    const result = classifier.importTrainingData(data);
                    _updateSampleDisplay(result);
                    document.getElementById('trainBtn').disabled = result.labels.length < 2;
                    // Sync the image-size selector to the loaded value
                    document.getElementById('imgSizeSelect').value = String(classifier.imgSize);
                    // Refresh the viewer if it is currently open
                    if (document.getElementById('trainingDataViewer').style.display !== 'none') {
                        renderTrainingSamples();
                    }
                } catch (err) {
                    alert('Failed to load training data: ' + err.message);
                }
                input.value = ''; // reset so the same file can be reloaded
            };
            reader.readAsText(file);
        }

        function toggleTrainingView() {
            const viewer = document.getElementById('trainingDataViewer');
            if (viewer.style.display === 'none') {
                renderTrainingSamples();
                viewer.style.display = 'block';
            } else {
                viewer.style.display = 'none';
            }
        }

        function renderTrainingSamples() {
            const gallery = document.getElementById('sampleGallery');
            const data    = classifier.exportTrainingData();
            const sz      = data.imgSize || 28;
            gallery.innerHTML = '';
            if (data.trainingData.length === 0) {
                gallery.innerHTML = '<p class="text-muted mb-0">No samples yet.</p>';
                return;
            }
            data.trainingData.forEach((sample, idx) => {
                const label = data.labelNames[sample.labelIdx];

                // Render the sz×sz pixel array (inverted, normalised) to a canvas
                const tmp = document.createElement('canvas');
                tmp.width  = sz;
                tmp.height = sz;
                const tmpCtx = tmp.getContext('2d');
                const imgData = tmpCtx.createImageData(sz, sz);
                for (let i = 0; i < sz * sz; i++) {
                    const val = Math.round((1.0 - sample.pixels[i]) * 255);
                    imgData.data[i * 4]     = val;
                    imgData.data[i * 4 + 1] = val;
                    imgData.data[i * 4 + 2] = val;
                    imgData.data[i * 4 + 3] = 255;
                }
                tmpCtx.putImageData(imgData, 0, 0);

                // Display at 2× the stored size, minimum 56px for readability
                const displaySize = Math.max(sz * 2, 56);
                const cvs = document.createElement('canvas');
                cvs.width  = displaySize;
                cvs.height = displaySize;
                cvs.style.outline = '1px solid #ccc';
                const ctx = cvs.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(tmp, 0, 0, displaySize, displaySize);

                // Label selector – allows relabelling to any existing label
                const sel = document.createElement('select');
                sel.className = 'form-select form-select-sm mt-1';
                sel.style.maxWidth = displaySize + 'px';
                data.labelNames.forEach(lName => {
                    const opt = document.createElement('option');
                    opt.value       = lName;
                    opt.textContent = lName;
                    if (lName === label) opt.selected = true;
                    sel.appendChild(opt);
                });
                sel.addEventListener('change', () => {
                    const result = classifier.relabelSample(idx, sel.value);
                    _updateSampleDisplay(result);
                    document.getElementById('trainBtn').disabled = result.labels.length < 2;
                    renderTrainingSamples();
                });

                // Delete button
                const delBtn = document.createElement('button');
                delBtn.type        = 'button';
                delBtn.className   = 'btn btn-sm btn-outline-danger mt-1';
                delBtn.style.width = displaySize + 'px';
                delBtn.textContent = 'Delete';
                delBtn.addEventListener('click', () => {
                    const result = classifier.removeSample(idx);
                    _updateSampleDisplay(result);
                    document.getElementById('trainBtn').disabled = result.labels.length < 2;
                    renderTrainingSamples();
                });

                const div = document.createElement('div');
                div.className = 'd-flex flex-column align-items-center';
                div.appendChild(cvs);
                div.appendChild(sel);
                div.appendChild(delBtn);
                gallery.appendChild(div);
            });
        }
    </script>
</body>

</html>
